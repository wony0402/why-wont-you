<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>어쩌라는 건데</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=DotGothic16&family=Galmuri11&display=swap');
@font-face{font-family:'Galmuri11';src:local('Galmuri11')}
:root{--p1:#2d1b4e;--pink:#e879c0;--pink-soft:#f0abd4;--star:#fde2f3;--ink:#f5e6f5}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'DotGothic16',monospace;color:var(--ink);
  display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;background:#1a1030}
.pixel{font-family:'DotGothic16','Galmuri11',monospace;image-rendering:pixelated}

.bg{position:fixed;inset:0;z-index:0;
  background:linear-gradient(160deg,#1a1030 0%,#2d1b4e 30%,#4a2c6d 60%,#6b3a7a 82%,#8b4a8c 100%);
  background-size:200% 200%;animation:grad 18s ease infinite}
@keyframes grad{0%{background-position:0% 0%}50%{background-position:100% 100%}100%{background-position:0% 0%}}
.glow-blob{position:fixed;border-radius:50%;filter:blur(80px);opacity:.45;z-index:0;mix-blend-mode:screen}
.gb1{width:400px;height:400px;background:#e879c0;top:-100px;right:-80px;animation:drift1 15s ease-in-out infinite}
.gb2{width:340px;height:340px;background:#7c5cbf;bottom:-90px;left:-70px;animation:drift2 17s ease-in-out infinite}
.gb3{width:240px;height:240px;background:#c084fc;top:45%;left:60%;animation:drift1 13s ease-in-out infinite}
@keyframes drift1{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,40px)}}
@keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,-30px)}}
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    radial-gradient(1.5px 1.5px at 12% 18%,rgba(253,226,243,.9),transparent),
    radial-gradient(1px 1px at 28% 42%,rgba(253,226,243,.7),transparent),
    radial-gradient(1.5px 1.5px at 48% 12%,rgba(255,255,255,.8),transparent),
    radial-gradient(1px 1px at 68% 32%,rgba(253,226,243,.7),transparent),
    radial-gradient(1.5px 1.5px at 82% 22%,rgba(255,255,255,.85),transparent),
    radial-gradient(1px 1px at 88% 55%,rgba(253,226,243,.6),transparent),
    radial-gradient(1.5px 1.5px at 35% 68%,rgba(253,226,243,.7),transparent),
    radial-gradient(1px 1px at 58% 78%,rgba(255,255,255,.6),transparent);
  animation:twinkle 4s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.6}50%{opacity:1}}

@keyframes spin{to{transform:rotate(360deg)}}

#start{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:30px;cursor:pointer;text-align:center;padding:24px}
#start .vinyl-start{width:300px;height:300px;animation:spin 18s linear infinite;image-rendering:pixelated;
  filter:drop-shadow(0 14px 40px rgba(232,121,192,.45))}
#start h1{font-family:'DotGothic16';font-weight:800;font-size:42px;letter-spacing:6px;
  text-shadow:2px 2px 0 #c2185b,4px 4px 0 #880e4f,6px 6px 0 rgba(136,14,79,.4),0 0 28px rgba(232,121,192,.6);-webkit-text-stroke:2.5px rgba(232,121,192,.8);paint-order:stroke fill}
#start .sub{font-family:'DotGothic16';font-size:13px;letter-spacing:5px;color:var(--pink-soft);margin-top:10px}
#start .press{font-family:'DotGothic16';font-size:14px;letter-spacing:1px;margin-top:10px;
  background:rgba(232,121,192,.16);padding:12px 26px;border:2px solid rgba(240,171,212,.5);
  animation:breathe 2.4s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:.8;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}

#player{position:relative;width:100vw;height:100vh;overflow:hidden;display:flex;z-index:1}
.cover-disc{animation:spin 18s linear infinite;image-rendering:pixelated;filter:drop-shadow(0 10px 30px rgba(232,121,192,.4))}
.title-plate{font-family:'DotGothic16';letter-spacing:3px;text-align:center;
  background:rgba(45,27,78,.4);border:2px solid rgba(240,171,212,.4);
  padding:11px 22px;backdrop-filter:blur(8px)}

/* intro 픽셀 문구 */
#intro{position:absolute;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;pointer-events:none}
#intro .imsg{position:absolute;font-family:'DotGothic16';font-size:24px;text-align:center;
  padding:0 20px;color:#fff;white-space:nowrap;opacity:0;transform:translateY(14px);
  transition:opacity 1s ease,transform 1s ease;text-shadow:3px 3px 0 rgba(232,121,192,.7),0 0 20px rgba(0,0,0,.4)}
#intro .imsg.show{opacity:1;transform:translateY(0);animation:introGlow 2.4s steps(2) infinite}
@keyframes introGlow{0%,100%{text-shadow:3px 3px 0 rgba(232,121,192,.7),0 0 16px rgba(253,226,243,.7)}50%{text-shadow:3px 3px 0 rgba(232,121,192,.9),0 0 28px rgba(253,226,243,1)}}
#intro .imsg.gone{opacity:0;transform:translateY(-14px)}

.lyrics-wrap{position:relative;overflow:hidden;flex:1;display:flex;align-items:center;justify-content:center}
.block{position:absolute;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:0 28px;opacity:0;transform:translateY(26px);pointer-events:none;text-align:center;
  transition:opacity 1.1s ease,transform 1.1s cubic-bezier(.22,.61,.36,1)}
.block.show{opacity:1;transform:translateY(0)}
.block.out{opacity:0;transform:translateY(-26px)}.block.out .line{animation:none !important;text-shadow:none !important}
.line{font-family:'DotGothic16';font-size:20px;line-height:1.8;padding:6px 0;font-weight:400;width:100%;
  text-shadow:0 2px 16px rgba(0,0,0,.35);opacity:0;transform:translateY(12px)}
.block.show .line{animation:fadeUp .9s ease forwards}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}



/* 아웃트로 배경 전환 - 하이라이트처럼 배경이 서서히 파랗게 물듦 */
#player.outro .bg{animation:outroGrad 28s ease forwards !important}
@keyframes outroGrad{
  0%  {background:linear-gradient(160deg,#1a1030,#2d1b4e 40%,#4a2c6d 70%,#8b4a8c)}
  25% {background:linear-gradient(160deg,#0f1a3a,#1a2a5e 35%,#3a4a8a 65%,#7a3a8a)}
  55% {background:linear-gradient(160deg,#071020,#1230608 35%,#1d4ed8 60%,#6b3a9a)}
  80% {background:linear-gradient(160deg,#040c18,#0a2050 30%,#1d4ed8 55%,#60a5fa 78%,#e879c0)}
  100%{background:linear-gradient(160deg,#030a14,#081840 28%,#1a44c8 52%,#60a5fa 74%,#f472b6 90%,#fde2f3)}
}
/* 블롭도 파랗게 전환 */
#player.outro .gb1{background:#60a5fa;transition:background 12s ease}
#player.outro .gb2{background:#3b82f6;transition:background 14s ease}
#player.outro .gb3{background:#818cf8;transition:background 10s ease}


/* 하이라이트 배경 서서히 물듦 */
#player.glowing{transition:background 2s ease}
#player.glowing .bg{animation:highlightGrad 3s ease forwards !important}
@keyframes highlightGrad{
  0%{background:linear-gradient(160deg,#1a1030,#2d1b4e 30%,#4a2c6d 60%,#8b4a8c)}
  100%{background:linear-gradient(160deg,#2d0a3e,#5a1a6e 25%,#8b1a8b 55%,#c2185b 80%,#e879c0)}
}
#player.glowing .gb1{background:#e879c0;transition:background 2s ease}
#player.glowing .gb2{background:#9333ea;transition:background 2s ease}
#player.glowing .gb3{background:#f472b6;transition:background 2s ease}
/* Final Chorus (outro+glow) → 파랑+핑크 */
#player.glowing.outro .bg{animation:finalGrad 3s ease forwards !important}
@keyframes finalGrad{
  0%{background:linear-gradient(160deg,#0a1020,#1a2a5e 30%,#2d4a9e 60%,#6b3a9a)}
  100%{background:linear-gradient(160deg,#040c18,#0f2050 25%,#1d4ed8 52%,#60a5fa 72%,#f472b6 90%)}
}
#player.glowing.outro .gb1{background:#60a5fa;transition:background 2s ease}
#player.glowing.outro .gb2{background:#3b82f6;transition:background 2s ease}
#player.glowing.outro .gb3{background:#f472b6;transition:background 2s ease}

/* Bridge-Rap 다크보라 배경 */
#player.rapping .bg{background:linear-gradient(160deg,#0d0718 0%,#1a0d2e 35%,#2d1055 65%,#3d1a6e 100%) !important;animation:none}
#player.rapping .glow-blob{opacity:.2}
/* Bridge-Rap 치지직 글리치 */
/* glitch 제거 - 일반 fadeUp 사용 */

/* glow 후렴 - 픽셀 느낌 하이라이트 */
.block.glow .line{font-family:'DotGothic16';font-weight:400;letter-spacing:2px}
.block.glow.show .line{color:#fff;text-shadow:2px 2px 0 var(--pink),0 0 16px rgba(253,226,243,.9),0 0 32px rgba(232,121,192,.8);animation:fadeUp .9s ease forwards,pixShimmer 1.8s steps(3) infinite}
@keyframes pixShimmer{0%,100%{text-shadow:2px 2px 0 var(--pink),0 0 14px rgba(253,226,243,.85),0 0 28px rgba(232,121,192,.7)}50%{text-shadow:2px 2px 0 #fff,0 0 24px rgba(253,226,243,1),0 0 44px rgba(232,121,192,1)}}

/* 픽셀 버블/스파클 효과 (🫧 픽셀 버전) */
#player.glowing .pixfx{opacity:1}
.pixfx{position:absolute;inset:0;z-index:3;pointer-events:none;opacity:0;transition:opacity 2s ease}
.pixfx .pb{position:absolute;background:rgba(253,226,243,.92);
  box-shadow:0 0 0 2px rgba(232,121,192,.65);image-rendering:pixelated}
.pb:nth-child(1){left:8%;top:75%;width:10px;height:10px;animation:rise 3.2s linear infinite}
.pb:nth-child(2){left:18%;top:80%;width:8px;height:8px;animation:rise 3.8s linear infinite .4s}
.pb:nth-child(3){left:28%;top:70%;width:14px;height:14px;animation:rise 3.0s linear infinite 1.1s}
.pb:nth-child(4){left:38%;top:85%;width:8px;height:8px;animation:rise 4.1s linear infinite .3s}
.pb:nth-child(5){left:48%;top:72%;width:12px;height:12px;animation:rise 3.5s linear infinite .7s}
.pb:nth-child(6){left:56%;top:78%;width:7px;height:7px;animation:rise 3.6s linear infinite 1.4s}
.pb:nth-child(7){left:64%;top:65%;width:10px;height:10px;animation:rise 3.9s linear infinite .2s}
.pb:nth-child(8){left:72%;top:80%;width:9px;height:9px;animation:rise 3.3s linear infinite 1.8s}
.pb:nth-child(9){left:80%;top:75%;width:11px;height:11px;animation:rise 3.7s linear infinite .9s}
.pb:nth-child(10){left:88%;top:82%;width:7px;height:7px;animation:rise 4.0s linear infinite .5s}
.pb:nth-child(11){left:14%;top:60%;width:9px;height:9px;animation:rise 3.4s linear infinite 2.1s}
.pb:nth-child(12){left:34%;top:55%;width:8px;height:8px;animation:rise 3.6s linear infinite 1.6s}
.pb:nth-child(13){left:52%;top:62%;width:12px;height:12px;animation:rise 3.2s linear infinite 2.4s}
.pb:nth-child(14){left:68%;top:58%;width:7px;height:7px;animation:rise 4.2s linear infinite 1.2s}
.pb:nth-child(15){left:78%;top:67%;width:10px;height:10px;animation:rise 3.8s linear infinite 2.7s}
.pb:nth-child(16){left:92%;top:73%;width:8px;height:8px;animation:rise 3.5s linear infinite 3.0s}
@keyframes rise{0%{transform:translateY(0) scale(.6);opacity:0}10%{opacity:1}85%{opacity:.85}100%{transform:translateY(-220px) scale(1.1);opacity:0}}

.controls{display:flex;flex-direction:column;gap:12px;z-index:6}
.bar{height:7px;background:rgba(255,255,255,.18);position:relative;cursor:pointer;overflow:hidden;border:1px solid rgba(240,171,212,.3)}
.fill{height:100%;width:0;background:linear-gradient(90deg,#c084fc,#e879c0);transition:width .1s linear}
.crow{display:flex;align-items:center;justify-content:space-between;gap:14px}
.tlab{font-family:'DotGothic16';font-size:12px;color:rgba(245,230,245,.85);font-variant-numeric:tabular-nums}
.btn{font-family:'DotGothic16';background:rgba(253,226,243,.95);color:#6b3a7a;border:none;padding:11px 18px;font-size:15px;cursor:pointer;
  border:2px solid rgba(232,121,192,.5);box-shadow:3px 3px 0 rgba(107,58,122,.5);transition:transform .1s}
.btn:active{transform:translate(3px,3px);box-shadow:none}

#player{flex-direction:column;align-items:center;max-width:560px;margin:0 auto}
.pc-left{display:none}
.head{width:100%;padding:30px 24px 8px;display:flex;flex-direction:column;align-items:center;gap:18px;z-index:6}
.head .cover-disc{width:150px;height:150px}
.head .title-plate{font-size:17px}
.main{flex:1;width:100%;display:flex;flex-direction:column;min-height:0}
.main .controls{padding:14px 24px 30px}

@media (min-width:820px) and (orientation:landscape){
  #player{flex-direction:row;max-width:none}
  .head{display:none}
  .pc-left{display:flex;flex-direction:column;align-items:center;justify-content:center;width:44%;height:100%;gap:30px;padding:40px;z-index:6}
  .pc-left .cover-disc{width:400px;height:400px}
  .pc-left .title-plate{font-size:16px}
  .main{width:56%;height:100%;padding:50px 54px;min-height:0}
  .main .pc-title{display:block !important;font-size:26px;margin-bottom:26px;align-self:flex-start}
  .main .lyrics-wrap{border:2px solid rgba(240,171,212,.25);background:rgba(45,27,78,.25);backdrop-filter:blur(4px)}
  .main .controls{padding:20px 6px 0}
  .line{font-size:24px;font-weight:400}
  #intro .imsg{font-size:34px}
}
</style>
</head>

const BLOCKS = [{"start": 12.0, "end": 25.0, "lines": ["몇 달째 너만 보고 있었는데", "왜 넌 자꾸 나한테 이래", "눈 마주치면 먼저 웃고", "괜히 내 옆에 와 바라보고 설레게해"], "glow": false, "glitch": false, "outro": false}, {"start": 27.0, "end": 39.0, "lines": ["좋아하게 만들지 마", "넌 날 좋아하지 않잖아", "용기 내서 말했던 날", "친구로 지내자 했잖아"], "glow": false, "glitch": false, "outro": false}, {"start": 40.5, "end": 52.0, "lines": ["근데 왜 또 다가와", "다 끝난 것처럼 굴다가", "또 아무렇지 않게 웃어", "나만 바보 되는 것 같아"], "glow": false, "glitch": false, "outro": false}, {"start": 52.0, "end": 63.5, "lines": ["싫다면서 왜 웃어줘", "멀어져야 한다며", "왜 또 내 이름 부르고", "왜 또 내 옆에 앉는데"], "glow": false, "glitch": false, "outro": false}, {"start": 65.0, "end": 78.0, "lines": ["너를 보면 답답해", "근데 또 보고 싶어", "이쯤 되면 나도 모르겠어", "대체 뭐가 맞는 건데"], "glow": false, "glitch": false, "outro": false}, {"start": 79.0, "end": 90.0, "lines": ["다른 누구로도 안 돼", "이미 알아버렸는데", "고백한 그날 이후로", "우리 사인 멀어졌어"], "glow": true, "glitch": false, "outro": false}, {"start": 90.0, "end": 105.0, "lines": ["그래도 아직 널 보면", "또 마음이 흔들려", "넌 대체 나보고", "어쩌라는 건데"], "glow": true, "glitch": false, "outro": false}, {"start": 107.0, "end": 112.0, "lines": ["솔직히 말할게", "답은 정해져 있었어", "근데 너도 알잖아", "사람 기대하게 만들었던 거"], "glow": false, "glitch": true, "outro": false}, {"start": 112.0, "end": 121.0, "lines": ["눈 마주치면 웃어주고", "누가 안 보면 손장난 치고", "집 갈 땐 괜히 내 쪽으로 돌아가고", "별것도 아닌 말 툭 던지고"], "glow": false, "glitch": true, "outro": false}, {"start": 121.0, "end": 127.5, "lines": ["난 또 그걸 기억하고", "혼자 의미를 만들고", "혹시 나만 그런 건 아니라고", "혼자 기대하고 혼자 실망하고"], "glow": false, "glitch": true, "outro": false}, {"start": 130.0, "end": 134.0, "lines": ["가끔 그런 생각 해", "내가 그날 말 안 했으면", "지금도 예전 같았을까"], "glow": false, "glitch": true, "outro": false}, {"start": 134.0, "end": 140.0, "lines": ["어색하지도 않고", "피하지도 않고", "그냥 웃고 떠들고", "아무 일 없었던 것처럼"], "glow": false, "glitch": true, "outro": false}, {"start": 140.0, "end": 146.0, "lines": ["근데 친구로 지내자던 건 너였잖아", "근데 왜 먼저 멀어졌어", "왜 전처럼 말도 안 걸어"], "glow": false, "glitch": true, "outro": false}, {"start": 146.0, "end": 156.0, "lines": ["왜 나만 여기 남겨놓고", "아무렇지 않은 척하는데", "그러다 또 어느 날은", "눈 마주치고 웃어"], "glow": false, "glitch": true, "outro": false}, {"start": 155.0, "end": 173.0, "lines": ["진짜 모르겠어", "날 밀어내는 건지", "아니면 그냥", "아무 생각 없는 건지"], "glow": false, "glitch": true, "outro": false}, {"start": 173.0, "end": 185.5, "lines": ["다른 누구로도 안 돼", "이미 알아버렸는데", "고백한 그날 이후로", "우리 거린 멀어졌어"], "glow": true, "glitch": false, "outro": false}, {"start": 185.5, "end": 200.0, "lines": ["네 마음속엔 내가 없는데", "또 마음이 흔들려", "넌 대체 나보고", "어쩌라는 건데"], "glow": true, "glitch": false, "outro": false}, {"start": 200.5, "end": 215.0, "lines": ["그래도 네가 좋아", "여전히 너만 보여", "밤새 나눴던 문자들", "추억으로 남긴 니 사진"], "glow": false, "glitch": false, "outro": true}, {"start": 212.0, "end": 228.0, "lines": ["다시 보고있어", "끝난 이야기인 거 알지만", "근데 나만 아직", "그날에 멈춰 있어"], "glow": false, "glitch": false, "outro": true}, {"start": 228.0, "end": 231.5, "lines": ["\"잘자\""], "glow": true, "glitch": false, "outro": true}, {"start": 231.5, "end": 244.0, "lines": ["\"고마웠어\""], "glow": true, "glitch": false, "outro": true}];
const audio=document.getElementById('audio');
const wrap=document.getElementById('wrap');
const introEl=document.getElementById('intro');
const introMsgs=[...introEl.children].map(el=>({el,t:parseFloat(el.dataset.t)}));
const playerEl=document.getElementById('player');

const blockEls=BLOCKS.map(blk=>{
  const d=document.createElement('div');d.className='block'+(blk.glow?' glow':'');
  blk.lines.forEach(t=>{const p=document.createElement('div');p.className='line';p.textContent=t;d.appendChild(p);});
  wrap.appendChild(d);return d;
});
function fmt(s){s=Math.max(0,s|0);return (s/60|0)+':'+String(s%60).padStart(2,'0')}

const INTRO_DUR=10.5;
let introStart=0, songStarted=false;

document.getElementById('start').addEventListener('click',()=>{
  document.getElementById('start').style.display='none';
  playerEl.style.display='flex';
  // 탭하자마자 노래 재생 (전주 흐르면서 인트로 문구 동시에 뜸)
  const p=audio.play();if(p&&p.catch)p.catch(()=>{});
  songStarted=true;
  introStart=performance.now();
  runIntro();
  setTimeout(tick,40);
});

let curIntro=-1;
function runIntro(){
  const elapsed=(performance.now()-introStart)/1000;
  let ii=-1;
  for(let i=0;i<introMsgs.length;i++){if(introMsgs[i].t<=elapsed)ii=i;else break;}
  if(ii!==curIntro){curIntro=ii;
    introMsgs.forEach((m,i)=>{m.el.classList.remove('show','gone');
      if(i<ii)m.el.classList.add('gone');else if(i===ii)m.el.classList.add('show');});}
  if(elapsed<INTRO_DUR){requestAnimationFrame(runIntro);}
  else{
    introMsgs.forEach(m=>{m.el.classList.remove('show');m.el.classList.add('gone');});
    introEl.style.display='none';
  }
}

let curBlock=-1;
function showBlock(bi){
  blockEls.forEach((el,i)=>{
    if(i===bi){el.classList.remove('out');el.classList.add('show');
      [...el.children].forEach((p,j)=>{p.style.animation='none';p.offsetHeight;p.style.animation=`fadeUp .9s ease ${j*0.13}s forwards`+(BLOCKS[bi].glow?`,pixShimmer 1.8s ease ${j*0.13}s infinite`:'');});
    }else if(i<bi){el.classList.remove('show');el.classList.add('out');}
    else{el.classList.remove('show','out');}
  });
  if(BLOCKS[bi].glow)playerEl.classList.add('glowing');else playerEl.classList.remove('glowing');
  if(BLOCKS[bi].glitch)playerEl.classList.add('rapping');else playerEl.classList.remove('rapping');
  if(BLOCKS[bi].outro)playerEl.classList.add('outro');else playerEl.classList.remove('outro');
}
function tick(){
  const t=audio.currentTime;
  let bi=-1;
  for(let i=0;i<BLOCKS.length;i++){if(BLOCKS[i].start<=t+0.05)bi=i;else break;}
  if(bi!==curBlock&&bi>=0){curBlock=bi;showBlock(bi);}
  const d=audio.duration||1;
  document.getElementById('fill').style.width=(audio.currentTime/d*100)+'%';
  document.getElementById('cur').textContent=fmt(audio.currentTime);
  requestAnimationFrame(tick);
}
audio.addEventListener('loadedmetadata',()=>{document.getElementById('dur').textContent=fmt(audio.duration);});
const playBtn=document.getElementById('play');
playBtn.addEventListener('click',()=>{if(!songStarted)return;if(audio.paused){audio.play();playBtn.textContent='❚❚';}else{audio.pause();playBtn.textContent='▶';}});
document.getElementById('bar').addEventListener('click',e=>{if(!songStarted)return;const r=e.currentTarget.getBoundingClientRect();audio.currentTime=(e.clientX-r.left)/r.width*audio.duration;curBlock=-1;});
</script>
</body>
</html>
